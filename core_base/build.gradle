plugins {
    alias(libs.plugins.android.library)
    alias(libs.plugins.kotlin.android)
    id 'maven-publish'
}

android {
    namespace = 'com.wkq.base'
    compileSdk appConfig.compileSdk

    defaultConfig {
        minSdk appConfig.minSdk

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildFeatures {
        viewBinding = true
    }
    publishing {
        singleVariant("release") {
            withSourcesJar()
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = appConfig.jvmTarget
    }
}

dependencies {
    implementation(libs.androidx.core.ktx)
    api(libs.androidx.appcompat)
    api(libs.androidx.lifecycle.viewmodel)
    api(libs.androidx.lifecycle.livedata.core)
    implementation(libs.androidx.lifecycle.viewmodel.ktx)
    implementation(libs.material)
    implementation(libs.androidx.lifecycle.runtime.ktx)
    implementation(libs.androidx.activity.ktx)
    api(libs.androidx.fragment)
    implementation(libs.androidx.fragment.ktx)
    implementation(libs.androidx.constraintlayout)
    api(libs.androidx.recyclerview)
    api(libs.androidx.viewpager2)
    implementation(libs.smartrefresh.layout.kernel)
    implementation(libs.xpopup) {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-android-extensions-runtime'
    }
    implementation(libs.smartrefresh.header.classics)
    implementation(libs.smartrefresh.header.material)
    implementation(libs.toasty)
}

def coreBaseVersionFile = file("version.properties")
def coreBaseVersionProperties = new Properties()
if (coreBaseVersionFile.exists()) {
    coreBaseVersionFile.withInputStream { stream ->
        coreBaseVersionProperties.load(stream)
    }
}
def defaultVersionName = coreBaseVersionProperties.getProperty("VERSION_NAME", "0.0.1")
def defaultPublishedVersion = defaultVersionName.startsWith("v")
        ? defaultVersionName
        : "v${defaultVersionName}"

def publishedGroupId = providers.gradleProperty("POM_GROUP_ID")
        .orElse(providers.environmentVariable("POM_GROUP_ID"))
        .orElse("com.github.wukuiqing49.AndroidCoreBase")
def publishedArtifactId = providers.gradleProperty("POM_ARTIFACT_ID")
        .orElse(providers.environmentVariable("POM_ARTIFACT_ID"))
        .orElse("core_base")
def publishedVersion = providers.gradleProperty("POM_VERSION")
        .orElse(providers.environmentVariable("POM_VERSION"))
        .orElse(defaultPublishedVersion)
def githubRepository = providers.gradleProperty("GITHUB_REPOSITORY")
        .orElse(providers.environmentVariable("GITHUB_REPOSITORY"))
        .orElse("wukuiqing49/AndroidCoreBase")

publishing {
    publications {
        release(MavenPublication) {
            groupId = publishedGroupId.get()
            artifactId = publishedArtifactId.get()
            version = publishedVersion.get()

            afterEvaluate {
                from components.release
            }

            pom {
                name = "core_base"
                description = "Android common base library: Activity, Fragment, ViewModel, Adapter, Dialog, Permission and Insets helpers."
                url = "https://github.com/${githubRepository.get()}"
                licenses {
                    license {
                        name = "The Apache License, Version 2.0"
                        url = "https://www.apache.org/licenses/LICENSE-2.0.txt"
                    }
                }
                developers {
                    developer {
                        id = "wukuiqing49"
                        name = "wukuiqing49"
                    }
                }
                scm {
                    connection = "scm:git:https://github.com/${githubRepository.get()}.git"
                    developerConnection = "scm:git:ssh://git@github.com/${githubRepository.get()}.git"
                    url = "https://github.com/${githubRepository.get()}"
                }
            }
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/${githubRepository.get()}")
            credentials {
                username = providers.gradleProperty("gpr.user")
                        .orElse(providers.environmentVariable("GITHUB_ACTOR"))
                        .orElse("")
                        .get()
                password = providers.gradleProperty("gpr.key")
                        .orElse(providers.environmentVariable("GITHUB_TOKEN"))
                        .orElse("")
                        .get()
            }
        }
    }
}
